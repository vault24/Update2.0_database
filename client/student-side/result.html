<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ============================ SEO ============================ -->
    <title>BTEB Result – Diploma &amp; Polytechnic Semester Result Search by Roll</title>
    <meta
      name="description"
      content="Check your BTEB result instantly by roll number. Diploma in Engineering semester results, GPA history, CGPA and referred subjects for every polytechnic institute in Bangladesh — free, fast and from official BTEB notices."
    />
    <meta name="author" content="Sirajganj Polytechnic Institute" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://result.spisg.gov.bd/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BTEB Result — Sirajganj Polytechnic Institute" />
    <meta property="og:title" content="BTEB Result – Diploma & Polytechnic Semester Result Search" />
    <meta
      property="og:description"
      content="Search BTEB diploma results by roll number: semester GPA, CGPA and referred subjects for every polytechnic institute in Bangladesh."
    />
    <meta property="og:url" content="https://result.spisg.gov.bd/" />
    <meta property="og:image" content="https://result.spisg.gov.bd/image/SIPI.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BTEB Result search portal" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="bn_BD" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BTEB Result – Search Diploma Results by Roll" />
    <meta
      name="twitter:description"
      content="Instant BTEB diploma & polytechnic result search — GPA history, CGPA and referred subjects from official board notices."
    />
    <meta name="twitter:image" content="https://result.spisg.gov.bd/image/SIPI.jpeg" />

    <!-- Structured data: WebSite + SearchAction, Organization, FAQ, Breadcrumb -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://result.spisg.gov.bd/#website",
          "url": "https://result.spisg.gov.bd/",
          "name": "BTEB Result",
          "description": "BTEB diploma and polytechnic semester result search by roll number for every institute in Bangladesh.",
          "inLanguage": ["en", "bn"],
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://result.spisg.gov.bd/?roll={roll_number}"
            },
            "query-input": "required name=roll_number"
          },
          "publisher": { "@id": "https://result.spisg.gov.bd/#organization" }
        },
        {
          "@type": "GovernmentOrganization",
          "@id": "https://result.spisg.gov.bd/#organization",
          "name": "Sirajganj Polytechnic Institute",
          "url": "https://spisg.gov.bd/",
          "logo": "https://spisg.gov.bd/spi-logo.png",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Sirajganj",
            "addressCountry": "BD"
          }
        },
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "Sirajganj Polytechnic Institute",
              "item": "https://spisg.gov.bd/"
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "BTEB Result Search",
              "item": "https://result.spisg.gov.bd/"
            }
          ]
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "How do I check my BTEB diploma result?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Enter your board roll number in the search box and press Search. Your semester result, GPA history, CGPA and referred subjects appear instantly — no account needed."
              }
            },
            {
              "@type": "Question",
              "name": "Which semesters and regulations are covered?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Every semester result BTEB has published for your roll, across regulations, is shown together as one history with your CGPA when available."
              }
            },
            {
              "@type": "Question",
              "name": "What does referred mean in a BTEB result?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Referred means you must clear the listed subjects in a later examination. The referred subject codes are listed with your result."
              }
            },
            {
              "@type": "Question",
              "name": "Can I download or print my BTEB result?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. After searching you can download a clean PDF copy, print the result, or share the link directly."
              }
            }
          ]
        }
      ]
    }
    </script>

    <!-- Favicon (shared with the institute portal) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <meta name="theme-color" content="#059669" />
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      <main style="max-width: 640px; margin: 3rem auto; font-family: system-ui, sans-serif; padding: 0 1rem;">
        <h1>BTEB Result Search</h1>
        <p>
          Search Bangladesh Technical Education Board (BTEB) diploma and
          polytechnic semester results by roll number: GPA history, CGPA and
          referred subjects for every institute, taken from officially
          published BTEB result notices.
        </p>
        <p>This result portal requires JavaScript. Please enable JavaScript and reload the page.</p>
        <p><a href="https://spisg.gov.bd/">Sirajganj Polytechnic Institute — Student Portal</a></p>
      </main>
    </noscript>
    <script type="module" src="/src/portal/main.tsx"></script>
  </body>
</html>
