    <!-- Fonts: preconnect + parallel stylesheet load (moved out of index.css
         where the @import chain blocked first paint on slow networks) -->

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Grotesk:wght@300..700&display=swap"
    />
    <!-- Launch screen: inline critical CSS so it paints on the very first frame,
         before the app bundle or any external CSS loads. Removed by main.tsx
         once React has painted. Themed to prefers-color-scheme to avoid a flash. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        background:
          radial-gradient(120% 90% at 50% 12%, #ffffff 0%, #ecfdf5 55%, #d1fae5 100%);
        opacity: 1;
        transition: opacity 0.45s ease;
        -webkit-tap-highlight-color: transparent;
      }
      #app-splash.app-splash--hide {
        opacity: 0;
        pointer-events: none;
      }
      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(0.9rem, 3.5vw, 1.4rem);
        text-align: center;
        padding: 1.5rem;
        animation: splashRise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .splash-logo {
        width: clamp(88px, 26vw, 128px);
        height: clamp(88px, 26vw, 128px);
        border-radius: 26%;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 18px 40px -12px rgba(5, 120, 90, 0.35), 0 4px 10px -4px rgba(5, 120, 90, 0.25);
      }
      .splash-logo img { width: 82%; height: 82%; object-fit: contain; }
      .splash-text { display: flex; flex-direction: column; gap: 0.35rem; max-width: 22rem; }
      .splash-title {
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-weight: 700;
        font-size: clamp(1.05rem, 4.4vw, 1.35rem);
        line-height: 1.25;
        color: #064e3b;
        letter-spacing: -0.01em;
      }
      .splash-sub {
        font-family: system-ui, sans-serif;
        font-size: clamp(0.78rem, 3vw, 0.9rem);
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #059669;
      }
      .splash-spinner {
        margin-top: 0.4rem;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 3px solid rgba(5, 150, 105, 0.22);
        border-top-color: #059669;
        animation: splashSpin 0.8s linear infinite;
      }
      @keyframes splashSpin { to { transform: rotate(360deg); } }
      @keyframes splashRise {
        from { opacity: 0; transform: translateY(10px) scale(0.98); }
        to { opacity: 1; transform: none; }
      }
      @media (prefers-color-scheme: dark) {
        #app-splash {
          background: radial-gradient(120% 90% at 50% 12%, #0f1e2e 0%, #0b1220 60%, #070d17 100%);
        }
        .splash-logo { box-shadow: 0 18px 44px -12px rgba(0, 0, 0, 0.6); }
        .splash-title { color: #d1fae5; }
        .splash-sub { color: #34d399; }
        .splash-spinner { border-color: rgba(52, 211, 153, 0.22); border-top-color: #34d399; }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-inner { animation: none; }
        .splash-spinner { animation-duration: 1.6s; }
      }
    </style>
  </head>

  <body>
    <div id="app-splash" role="status" aria-live="polite" aria-label="Loading SIPI Student Portal">
      <div class="splash-inner">
        <div class="splash-logo">
          <img src="/icons/icon-192.png" alt="Sirajganj Government Polytechnic Institute" width="128" height="128" />
        </div>
        <div class="splash-text">
          <div class="splash-title">Sirajganj Government Polytechnic Institute</div>
          <div class="splash-sub">Student Portal</div>
        </div>
        <div class="splash-spinner" aria-hidden="true"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Safety net: never let the splash trap the user if the app bundle fails
      // to load. main.tsx hides it as soon as React paints; this is a backstop.
      window.__SIPI_SPLASH_TIMEOUT__ = window.setTimeout(function () {
        var s = document.getElementById("app-splash");
        if (s) s.classList.add("app-splash--hide");
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
