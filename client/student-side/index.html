    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the app draw under notches; safe-area CSS insets
         keep content clear. maximum-scale is NOT set, so pinch-zoom (a11y) works. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sirajganj Government Polytechnic Institute - Student Portal</title>
    <meta name="description" content="Access your academic journey, manage admissions, track progress at Sirajganj Polytechnic Institute Student Portal" />
    <meta name="author" content="Sirajganj Polytechnic Institute" />
    <meta name="keywords" content="Sirajganj Polytechnic, Student Portal, Admission, Bangladesh, Technical Education" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Sirajganj Polytechnic Institute - Student Portal" />
    <meta property="og:description" content="Modern student portal for admission, academic tracking, and institutional management" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://spisg.gov.bd/" />
    <meta property="og:image" content="https://spisg.gov.bd/image/SIPI.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Sirajganj Polytechnic Institute" />

    <link rel="canonical" href="https://spisg.gov.bd" />

    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS / Safari standalone support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
