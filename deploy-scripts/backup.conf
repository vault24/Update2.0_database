# =============================================================================
# SIPI — BACKUP CONFIGURATION  (single source of truth for backup & restore)
# =============================================================================
# This file configures the independent Restic-based backup system. It is
# completely separate from deployment (config.env / deploy.sh). Edit here, then
# run:  sudo ./deploy-scripts/backup.sh
#
# Restic gives us: incremental backups, deduplication, snapshots, compression
# and encryption in one tool — a daily run stores only what changed, never a
# full duplicate.
#
# Secrets: the repository ENCRYPTION PASSWORD is NOT stored in this file. It
# lives in a separate password file (RESTIC_PASSWORD_FILE, gitignored,
# auto-generated on first backup). Keep a copy somewhere safe — without it the
# backups cannot be decrypted or restored.
# =============================================================================

# ---------------------------------------------------------------------------
# 1. BACKUP LOCATION  — THE ONE VALUE YOU CHANGE TO MOVE BACKUPS
# ---------------------------------------------------------------------------
# The Restic repository (where snapshots are stored). Change ONLY this line to
# send future backups to a different disk / mount / server. Examples:
#
#   Local disk (default):     /var/backups/sipi-restic
#   External HDD (mounted):   /mnt/backup-hdd/sipi-restic
#   USB drive:                /media/usb/sipi-restic
#   NAS / network mount:      /mnt/nas/sipi-restic
#   SFTP (remote server):     sftp:backupuser@203.0.113.9:/backups/sipi
#   REST server:              rest:https://backup.example.com/sipi
#   Amazon S3 / compatible:   s3:s3.amazonaws.com/my-bucket/sipi
#
# For sftp/rest/s3 backends you also set the relevant credentials in
# section 6 (Backend credentials). For local/mounted paths nothing else is
# needed. If the path is on a removable/mounted drive, set REQUIRE_MOUNT below.
RESTIC_REPOSITORY="/var/backups/sipi-restic"

# If the repository lives on a mount point (external HDD, NAS…), set this to
# the mount directory. backup.sh refuses to run if it is not mounted — this
# prevents silently writing backups to the local disk when the drive is
# unplugged. Leave EMPTY for a plain local repository.
REQUIRE_MOUNT=""
# Example for an external drive:  REQUIRE_MOUNT="/mnt/backup-hdd"

# ---------------------------------------------------------------------------
# 2. ENCRYPTION PASSWORD FILE
# ---------------------------------------------------------------------------
# File containing the repository password (one line). Auto-created with a
# strong random password on first run if missing. chmod 600, gitignored.
# BACK THIS FILE UP SEPARATELY (e.g. a password manager) — losing it means
# losing access to every backup.
RESTIC_PASSWORD_FILE="/etc/sipi/backup-password"

# ---------------------------------------------------------------------------
# 3. RETENTION POLICY  (how many snapshots to keep after each backup)
# ---------------------------------------------------------------------------
# Old snapshots beyond these limits are pruned automatically. Because of
# deduplication, keeping many snapshots costs very little disk.
KEEP_DAILY="7"      # keep the last 7 daily snapshots
KEEP_WEEKLY="4"     # + one per week for 4 weeks
KEEP_MONTHLY="6"    # + one per month for 6 months
KEEP_LAST="3"       # always keep at least the 3 most recent, regardless

# ---------------------------------------------------------------------------
# 4. WHAT TO BACK UP
# ---------------------------------------------------------------------------
# PostgreSQL is dumped to a staging file and included automatically (see
# section 5). These are the filesystem paths added to every snapshot.
# Space/newline separated. Missing paths are skipped with a warning.
#
# ${PROJECT_PATH} and other values are inherited from config.env, which
# backup.sh sources first — so paths track your deployment automatically.
BACKUP_PATHS=(
  "${PROJECT_PATH}/server/.env"                 # Django environment
  "${PROJECT_PATH}/server/media"                # user media
  "${PROJECT_PATH}/server/storage"              # uploaded documents
  "${PROJECT_PATH}/server/staticfiles"          # collected static (fast restore)
  "${PROJECT_PATH}/client/student-side/.env"    # frontend build env
  "${PROJECT_PATH}/client/admin-side/.env"
  "${PROJECT_PATH}/deploy-scripts"              # config.env, secrets.env, scripts, generated/
  "/etc/nginx/sites-available/${NGINX_SITE_NAME}"
  "/etc/nginx/snippets"                         # sipi-*.conf snippets
  "/etc/nginx/conf.d"                            # sipi-global.conf
  "/etc/systemd/system/${SERVICE_NAME}.service"
  "/etc/letsencrypt"                            # SSL certs + renewal config
)

# Include server logs in the backup? Usually not worth it (large, regenerable).
BACKUP_LOGS="false"
LOG_PATHS=(
  "${GUNICORN_LOG_DIR:-/var/log/gunicorn}"
  "/var/log/nginx"
)

# Exclusion patterns (never backed up — regenerable or noise).
# IMPORTANT: these are deliberately scoped so they can NEVER match user data
# under server/media or server/storage. Only Python/venv/git noise and the
# client build artefacts are excluded — student uploads are always kept.
BACKUP_EXCLUDES=(
  "*.pyc"
  "*/__pycache__/*"
  "*/.git/*"
  "${PROJECT_PATH}/server/venv/*"
  "${PROJECT_PATH}/client/*/node_modules/*"      # scoped to client only
  "${PROJECT_PATH}/client/*/dist/*"              # rebuilt by deploy.sh --frontend
)

# ---------------------------------------------------------------------------
# 5. DATABASE (PostgreSQL) — dumped into each snapshot
# ---------------------------------------------------------------------------
# DB_NAME / DB_USER etc. are inherited from config.env. The dump is written to
# this staging directory, backed up, then removed. Keep it on local disk.
BACKUP_DB="true"
DB_DUMP_STAGING="/var/backups/sipi-staging"

# Redis is only used as the Channels (WebSocket) layer here — it holds no
# persistent application data, so it is NOT backed up by default. Set to
# "true" only if you start using Redis for durable data.
BACKUP_REDIS="false"

# ---------------------------------------------------------------------------
# 6. BACKEND CREDENTIALS (only for remote repos: sftp / rest / s3)
# ---------------------------------------------------------------------------
# Leave empty for local/mounted repositories. For remote backends, fill the
# ones your backend needs. These are exported to Restic at runtime.
#   SFTP:  usually key-based — ensure the RUN user's SSH key can reach the host.
#   REST:  set REST server user/pass in the URL or via env below.
#   S3:    set the access keys below.
AWS_ACCESS_KEY_ID=""
AWS_SECRET_ACCESS_KEY=""
# Any extra restic env (advanced), e.g. B2/Azure creds. Leave empty if unused.
# RESTIC_REST_USERNAME="" ; RESTIC_REST_PASSWORD=""

# ---------------------------------------------------------------------------
# 7. AUTOMATIC SCHEDULE  (systemd timer installed by backup.sh --install-timer)
# ---------------------------------------------------------------------------
# OnCalendar syntax. Default: every day at 03:30, with up to 15 min random
# delay so many servers don't hit shared storage at the same second.
BACKUP_SCHEDULE="*-*-* 03:30:00"
BACKUP_RANDOM_DELAY="15min"

# ---------------------------------------------------------------------------
# 8. LOGGING & VERIFICATION
# ---------------------------------------------------------------------------
BACKUP_LOG_DIR="/var/log/sipi-backup"
# After each backup, verify repository integrity. "quick" checks structure
# only (fast, safe for daily). "full" also re-reads a subset of data (slower).
# "none" skips verification.
VERIFY_MODE="quick"
